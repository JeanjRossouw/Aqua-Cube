<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Shopping Cart - Aqua Cube</title><link rel="stylesheet" href="css/style.css"><style>.cart-container{max-width:1000px;margin:40px auto;padding:20px}.cart-item{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ddd;padding:15px 0}.item-price{font-weight:bold;color:#008CBA}.quantity-input{width:60px;padding:5px}.cart-summary{background-color:#f4f4f4;padding:20px;border-radius:5px;margin-top:30px}.summary-row{display:flex;justify-content:space-between;margin:10px 0;font-size:18px}.summary-total{font-weight:bold;font-size:24px;color:#008CBA;border-top:2px solid #ddd;padding-top:10px}.btn-checkout{background-color:#008CBA;color:white;padding:15px 30px;border:none;border-radius:5px;cursor:pointer;font-size:16px;margin-top:20px;width:100%}.btn-remove{background-color:#e74c3c;color:white;padding:5px 10px;border:none;border-radius:3px;cursor:pointer}</style></head><body><nav class="navbar"><div class="logo">AQUA CUBE</div><ul class="nav-menu"><li><a href="index.html">Home</a></li><li><a href="products.html">Products</a></li><li><a href="cart.html" class="active">Cart</a></li></ul></nav><div class="cart-container"><h1>Shopping Cart</h1><div id="cart-items"></div><div id="cart-summary" class="cart-summary"><h2>Order Summary</h2><div class="summary-row"><span>Subtotal:</span><span id="subtotal">$0.00</span></div><div class="summary-row"><span>Tax:</span><span id="tax">$0.00</span></div><div class="summary-row summary-total"><span>Total:</span><span id="total">$0.00</span></div><button class="btn-checkout" onclick="checkout()">Checkout</button></div></div><script src="js/app.js"></script></body></html>
