<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="cylinderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" fill="url(#bg6)"/>
  <!-- CO2 cylinder -->
  <rect x="55" y="45" width="36" height="100" rx="14" fill="url(#cylinderGrad)"/>
  <rect x="55" y="45" width="36" height="18" rx="14" fill="#64748b"/>
  <!-- Label -->
  <rect x="59" y="82" width="28" height="22" rx="2" fill="#dc2626"/>
  <text x="73" y="97" font-family="Arial" font-size="10" font-weight="bold" fill="white" text-anchor="middle">CO₂</text>
  <!-- Valve on top -->
  <rect x="65" y="28" width="16" height="17" rx="2" fill="#4a5568"/>
  <circle cx="73" cy="33" r="5" fill="#2d3748"/>
  <!-- Regulator box -->
  <rect x="110" y="58" width="60" height="50" rx="5" fill="#1a202c"/>
  <circle cx="130" cy="78" r="12" fill="#e5e7eb"/>
  <circle cx="130" cy="78" r="9" fill="white"/>
  <line x1="130" y1="78" x2="125" y2="72" stroke="#dc2626" stroke-width="1.5"/>
  <circle cx="155" cy="78" r="8" fill="#fde047"/>
  <!-- Tube to aquarium -->
  <path d="M170,85 Q195,85 200,110 Q203,135 195,150" stroke="#16a34a" stroke-width="3" fill="none"/>
  <!-- Diffuser at end -->
  <rect x="188" y="145" width="14" height="20" rx="2" fill="#64748b"/>
  <circle cx="195" cy="160" r="6" fill="#e2e8f0" opacity="0.7"/>
  <!-- Bubbles rising -->
  <circle cx="195" cy="140" r="2.5" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
  <circle cx="198" cy="128" r="2" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
  <circle cx="192" cy="115" r="1.8" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.4"/>
  <!-- Connection valve -->
  <rect x="88" y="75" width="24" height="8" rx="2" fill="#4a5568"/>
</svg>
