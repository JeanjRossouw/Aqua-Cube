<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" fill="url(#bg11)"/>
  <!-- Metal cabinet frame -->
  <!-- Top -->
  <rect x="55" y="40" width="130" height="6" fill="#4a5568"/>
  <!-- Legs (4 visible) -->
  <rect x="55" y="40" width="6" height="115" fill="#2d3748"/>
  <rect x="179" y="40" width="6" height="115" fill="#2d3748"/>
  <rect x="115" y="40" width="5" height="115" fill="#4a5568" opacity="0.8"/>
  <!-- Top surface (perspective) -->
  <polygon points="55,46 185,46 180,40 60,40" fill="#64748b"/>
  <!-- Cross braces diagonal -->
  <line x1="61" y1="155" x2="179" y2="80" stroke="#64748b" stroke-width="2" opacity="0.6"/>
  <line x1="61" y1="80" x2="179" y2="155" stroke="#64748b" stroke-width="2" opacity="0.6"/>
  <!-- Horizontal braces -->
  <rect x="61" y="75" width="118" height="3" fill="#4a5568"/>
  <rect x="61" y="120" width="118" height="3" fill="#4a5568"/>
  <!-- Feet -->
  <rect x="53" y="154" width="10" height="4" rx="1" fill="#1a202c"/>
  <rect x="177" y="154" width="10" height="4" rx="1" fill="#1a202c"/>
  <rect x="113" y="154" width="10" height="4" rx="1" fill="#1a202c"/>
  <!-- Barcode label on side -->
  <rect x="62" y="100" width="20" height="12" fill="white" stroke="#1a202c" stroke-width="0.5"/>
  <line x1="64" y1="102" x2="64" y2="110" stroke="#1a202c" stroke-width="0.5"/>
  <line x1="66" y1="102" x2="66" y2="110" stroke="#1a202c" stroke-width="1"/>
  <line x1="68" y1="102" x2="68" y2="110" stroke="#1a202c" stroke-width="0.5"/>
  <line x1="70" y1="102" x2="70" y2="110" stroke="#1a202c" stroke-width="1.5"/>
  <line x1="73" y1="102" x2="73" y2="110" stroke="#1a202c" stroke-width="0.5"/>
  <line x1="75" y1="102" x2="75" y2="110" stroke="#1a202c" stroke-width="1"/>
  <line x1="77" y1="102" x2="77" y2="110" stroke="#1a202c" stroke-width="0.5"/>
  <line x1="79" y1="102" x2="79" y2="110" stroke="#1a202c" stroke-width="1.5"/>
  <!-- Dimensions text -->
  <text x="120" y="170" font-family="Arial" font-size="9" fill="#2d3748" text-anchor="middle">METAL CABINET</text>
</svg>
