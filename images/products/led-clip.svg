<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" fill="url(#bg3)"/>
  <!-- Tank rim edge -->
  <rect x="20" y="120" width="200" height="8" fill="#2c3e50" opacity="0.4"/>
  <!-- Clip base -->
  <rect x="70" y="100" width="40" height="28" rx="3" fill="#1a202c"/>
  <rect x="70" y="100" width="40" height="6" rx="3" fill="#2d3748"/>
  <!-- Flexible arm -->
  <path d="M90,100 Q100,70 130,60 Q160,50 170,55" stroke="#2d3748" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Light head -->
  <ellipse cx="175" cy="55" rx="22" ry="10" fill="#1a202c" transform="rotate(15,175,55)"/>
  <ellipse cx="175" cy="55" rx="18" ry="6" fill="#4a5568" transform="rotate(15,175,55)"/>
  <!-- LEDs on head -->
  <circle cx="168" cy="54" r="2" fill="#fde047"/>
  <circle cx="175" cy="55" r="2" fill="#fde047"/>
  <circle cx="182" cy="56" r="2" fill="#fde047"/>
  <!-- Light beam -->
  <path d="M165,62 L120,165 L220,165 L190,62 Z" fill="#fde047" opacity="0.15"/>
  <!-- Glow on surface -->
  <ellipse cx="170" cy="165" rx="60" ry="8" fill="#fde047" opacity="0.3"/>
</svg>
