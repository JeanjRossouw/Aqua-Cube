<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" fill="url(#bg1)"/>
  <!-- LED bar fixture -->
  <rect x="30" y="55" width="180" height="22" rx="4" fill="#1a202c"/>
  <rect x="30" y="55" width="180" height="4" rx="2" fill="#2d3748"/>
  <!-- LED diode strip -->
  <rect x="35" y="63" width="170" height="10" rx="2" fill="#0a0f1a"/>
  <circle cx="50" cy="68" r="2.8" fill="#fde047"/>
  <circle cx="70" cy="68" r="2.8" fill="#fde047"/>
  <circle cx="90" cy="68" r="2.8" fill="#fde047"/>
  <circle cx="110" cy="68" r="2.8" fill="#fde047"/>
  <circle cx="130" cy="68" r="2.8" fill="#fde047"/>
  <circle cx="150" cy="68" r="2.8" fill="#fde047"/>
  <circle cx="170" cy="68" r="2.8" fill="#fde047"/>
  <circle cx="190" cy="68" r="2.8" fill="#fde047"/>
  <!-- Bracket mounts -->
  <rect x="28" y="45" width="10" height="20" rx="2" fill="#4a5568"/>
  <rect x="202" y="45" width="10" height="20" rx="2" fill="#4a5568"/>
  <!-- Light beam -->
  <path d="M40,77 L20,160 L220,160 L200,77 Z" fill="#fde047" opacity="0.15"/>
  <path d="M60,77 L50,155 L190,155 L180,77 Z" fill="#fde047" opacity="0.1"/>
  <!-- Glow pool -->
  <ellipse cx="120" cy="160" rx="95" ry="12" fill="#fde047" opacity="0.3"/>
  <!-- Shimmer rays -->
  <line x1="70" y1="85" x2="60" y2="150" stroke="#fde047" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="85" x2="120" y2="155" stroke="#fde047" stroke-width="1" opacity="0.3"/>
  <line x1="170" y1="85" x2="180" y2="150" stroke="#fde047" stroke-width="1" opacity="0.3"/>
</svg>
