<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" fill="url(#bg12)"/>
  <!-- Controller body (rounded rectangle) -->
  <rect x="70" y="65" width="100" height="50" rx="12" fill="#1a202c"/>
  <rect x="70" y="65" width="100" height="10" rx="12" fill="#2d3748"/>
  <!-- Status indicator light -->
  <circle cx="90" cy="90" r="5" fill="#10b981"/>
  <circle cx="90" cy="90" r="2" fill="#ecfccb"/>
  <!-- WiFi indicator arcs -->
  <path d="M125,95 Q135,85 145,95" stroke="#48cae4" stroke-width="2" fill="none"/>
  <path d="M120,100 Q135,82 150,100" stroke="#48cae4" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M115,105 Q135,78 155,105" stroke="#48cae4" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="135" cy="100" r="2" fill="#48cae4"/>
  <!-- Port cable -->
  <path d="M170,90 Q200,90 210,110" stroke="#1a202c" stroke-width="3" fill="none"/>
  <!-- USB connector end -->
  <rect x="205" y="108" width="12" height="6" fill="#cbd5e1"/>
  <!-- Branding -->
  <text x="120" y="135" font-family="Arial" font-size="8" fill="#2d3748" text-anchor="middle" font-weight="bold">WiFi CONTROLLER</text>
</svg>
