<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="matGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" fill="url(#bg9)"/>
  <!-- Folded mat (perspective) -->
  <!-- Bottom layer -->
  <polygon points="40,120 200,120 210,140 30,140" fill="#2d3748"/>
  <!-- Middle layer -->
  <polygon points="45,100 195,100 205,120 35,120" fill="url(#matGrad)"/>
  <!-- Top layer -->
  <polygon points="50,80 190,80 200,100 40,100" fill="#4a5568"/>
  <!-- Top surface -->
  <polygon points="50,80 190,80 180,68 60,68" fill="#64748b"/>
  <!-- Texture pattern -->
  <line x1="65" y1="74" x2="175" y2="74" stroke="#2d3748" stroke-width="0.8" opacity="0.5"/>
  <line x1="55" y1="85" x2="185" y2="85" stroke="#1a202c" stroke-width="0.8" opacity="0.5"/>
  <line x1="52" y1="92" x2="188" y2="92" stroke="#1a202c" stroke-width="0.8" opacity="0.5"/>
  <line x1="48" y1="105" x2="192" y2="105" stroke="#1a202c" stroke-width="0.8" opacity="0.5"/>
  <line x1="44" y1="115" x2="196" y2="115" stroke="#1a202c" stroke-width="0.8" opacity="0.5"/>
  <line x1="40" y1="125" x2="200" y2="125" stroke="#1a202c" stroke-width="0.8" opacity="0.5"/>
  <line x1="36" y1="135" x2="204" y2="135" stroke="#1a202c" stroke-width="0.8" opacity="0.5"/>
  <!-- Label -->
  <rect x="100" y="148" width="40" height="20" rx="3" fill="#10b981"/>
  <text x="120" y="162" font-family="Arial" font-size="10" font-weight="bold" fill="white" text-anchor="middle">MAT</text>
</svg>
