<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" fill="url(#bg13)"/>
  <!-- Power brick body (perspective) -->
  <rect x="70" y="60" width="110" height="60" rx="4" fill="#1a202c"/>
  <rect x="70" y="60" width="110" height="8" rx="4" fill="#2d3748"/>
  <!-- Top surface perspective -->
  <polygon points="70,60 180,60 175,54 75,54" fill="#2d3748"/>
  <!-- Vents -->
  <line x1="80" y1="80" x2="80" y2="110" stroke="#4a5568" stroke-width="0.8"/>
  <line x1="85" y1="80" x2="85" y2="110" stroke="#4a5568" stroke-width="0.8"/>
  <line x1="90" y1="80" x2="90" y2="110" stroke="#4a5568" stroke-width="0.8"/>
  <line x1="95" y1="80" x2="95" y2="110" stroke="#4a5568" stroke-width="0.8"/>
  <!-- Label -->
  <rect x="110" y="78" width="60" height="24" rx="2" fill="#f1f5f9"/>
  <text x="140" y="89" font-family="Arial" font-size="6" fill="#1a202c" text-anchor="middle" font-weight="bold">36V 4.3A</text>
  <text x="140" y="98" font-family="Arial" font-size="6" fill="#64748b" text-anchor="middle">POWER SUPPLY</text>
  <!-- DC cable -->
  <path d="M180,90 Q210,90 215,120" stroke="#1a202c" stroke-width="3" fill="none"/>
  <!-- DC connector -->
  <rect x="212" y="118" width="8" height="10" rx="2" fill="#4a5568"/>
  <!-- AC cable -->
  <path d="M70,90 Q45,90 35,65" stroke="#1a202c" stroke-width="3" fill="none"/>
  <!-- AC plug -->
  <rect x="25" y="50" width="18" height="16" rx="2" fill="#2d3748"/>
  <circle cx="31" cy="58" r="1.5" fill="#cbd5e1"/>
  <circle cx="37" cy="58" r="1.5" fill="#cbd5e1"/>
</svg>
