<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" fill="url(#bg14)"/>
  <!-- Glass pot (dew shaped) -->
  <!-- Back shadow -->
  <ellipse cx="120" cy="155" rx="50" ry="8" fill="#1e293b" opacity="0.15"/>
  <!-- Glass body -->
  <path d="M85,45 Q85,60 80,80 Q75,110 90,140 Q100,155 120,155 Q140,155 150,140 Q165,110 160,80 Q155,60 155,45 Z" fill="#f1f9ff" opacity="0.7" stroke="#60a5fa" stroke-width="1.2"/>
  <!-- Rim -->
  <ellipse cx="120" cy="45" rx="35" ry="5" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Water inside with plants -->
  <path d="M90,95 Q100,92 120,95 Q140,98 150,95 L148,135 Q140,150 120,150 Q100,150 92,135 Z" fill="#7dd3fc" opacity="0.5"/>
  <!-- Plants inside -->
  <path d="M105,150 Q102,130 108,115" stroke="#2d6a4f" stroke-width="2" fill="none"/>
  <ellipse cx="108" cy="115" rx="8" ry="4" fill="#52b788" transform="rotate(-20,108,115)"/>
  <ellipse cx="102" cy="128" rx="7" ry="3.5" fill="#40916c" transform="rotate(15,102,128)"/>
  <path d="M135,150 Q138,128 132,112" stroke="#2d6a4f" stroke-width="2" fill="none"/>
  <ellipse cx="132" cy="112" rx="8" ry="4" fill="#74c69d" transform="rotate(20,132,112)"/>
  <!-- Substrate at bottom -->
  <ellipse cx="120" cy="150" rx="26" ry="4" fill="#a07c3c" opacity="0.7"/>
  <!-- Glass reflection -->
  <path d="M92,50 Q90,80 95,120" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M97,55 Q95,85 100,115" stroke="white" stroke-width="1" fill="none" opacity="0.4"/>
</svg>
