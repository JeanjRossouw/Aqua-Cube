<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380">
  <defs>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0077b6"/>
      <stop offset="55%" stop-color="#0096c7"/>
      <stop offset="100%" stop-color="#48cae4"/>
    </linearGradient>
    <linearGradient id="glassLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#a07c3c"/>
    </linearGradient>
    <radialGradient id="fishOrange" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#e07030"/>
    </radialGradient>
    <radialGradient id="fishTeal" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#0e8ea0"/>
    </radialGradient>
    <radialGradient id="fishPink" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#c05a8a"/>
    </radialGradient>
    <clipPath id="tankClip">
      <rect x="22" y="22" width="456" height="336" rx="4"/>
    </clipPath>
  </defs>

  <!-- Tank background water -->
  <rect x="22" y="22" width="456" height="336" rx="4" fill="url(#waterGrad)"/>

  <!-- Light rays from surface -->
  <polygon points="80,22 100,22 60,200" fill="white" opacity="0.04"/>
  <polygon points="180,22 210,22 150,260" fill="white" opacity="0.04"/>
  <polygon points="290,22 320,22 310,280" fill="white" opacity="0.04"/>
  <polygon points="390,22 420,22 450,220" fill="white" opacity="0.04"/>

  <!-- Water shimmer at surface -->
  <path d="M22,40 Q80,30 160,38 Q240,46 320,34 Q400,22 478,36" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.35"/>
  <path d="M22,50 Q80,40 160,48 Q240,56 320,44 Q400,32 478,46" fill="none" stroke="white" stroke-width="1.2" stroke-opacity="0.2"/>

  <!-- ===== PLANTS LEFT ===== -->
  <!-- Tall stem plant far-left -->
  <path d="M55,340 Q48,295 58,255 Q66,218 52,175" stroke="#2d6a4f" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="52" cy="175" rx="22" ry="10" fill="#52b788" transform="rotate(-35,52,175)"/>
  <ellipse cx="58" cy="205" rx="19" ry="9" fill="#40916c" transform="rotate(22,58,205)"/>
  <ellipse cx="64" cy="240" rx="17" ry="8" fill="#52b788" transform="rotate(-18,64,240)"/>
  <ellipse cx="58" cy="275" rx="15" ry="7" fill="#74c69d" transform="rotate(10,58,275)"/>
  <!-- Thin stem -->
  <path d="M88,340 Q95,300 80,268 Q70,240 84,210" stroke="#2d6a4f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="84" cy="210" rx="14" ry="7" fill="#74c69d" transform="rotate(28,84,210)"/>
  <ellipse cx="78" cy="240" rx="12" ry="6" fill="#52b788" transform="rotate(-22,78,240)"/>

  <!-- ===== PLANTS RIGHT ===== -->
  <path d="M440,340 Q448,290 432,248 Q422,210 438,168" stroke="#2d6a4f" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="438" cy="168" rx="22" ry="10" fill="#52b788" transform="rotate(35,438,168)"/>
  <ellipse cx="432" cy="200" rx="19" ry="9" fill="#40916c" transform="rotate(-22,432,200)"/>
  <ellipse cx="440" cy="235" rx="17" ry="8" fill="#52b788" transform="rotate(18,440,235)"/>
  <path d="M466,340 Q458,298 472,265 Q480,238 465,206" stroke="#2d6a4f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="465" cy="206" rx="14" ry="7" fill="#74c69d" transform="rotate(-28,465,206)"/>
  <ellipse cx="472" cy="238" rx="12" ry="6" fill="#52b788" transform="rotate(20,472,238)"/>

  <!-- ===== CORAL CENTER-LEFT ===== -->
  <path d="M190,340 L186,305 L176,272 L170,240" stroke="#e63946" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M186,305 L196,288 L202,265" stroke="#e63946" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M176,272 L164,255" stroke="#e63946" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <circle cx="170" cy="240" r="6" fill="#ff6b6b"/>
  <circle cx="202" cy="265" r="5" fill="#ff6b6b"/>
  <circle cx="164" cy="255" r="4.5" fill="#ff8585"/>

  <!-- ===== ROUND CORAL CENTER ===== -->
  <circle cx="260" cy="325" r="18" fill="#f4a261"/>
  <circle cx="256" cy="308" r="5" fill="#e76f51"/>
  <circle cx="270" cy="312" r="4.5" fill="#e76f51"/>
  <circle cx="250" cy="314" r="4" fill="#e8825e"/>
  <circle cx="265" cy="298" r="3.5" fill="#ff9f6a"/>

  <!-- ===== CORAL RIGHT-CENTER ===== -->
  <path d="M330,340 L334,308 L342,278 L346,250" stroke="#9b59b6" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <path d="M334,308 L324,292 L318,270" stroke="#9b59b6" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M342,278 L354,262" stroke="#9b59b6" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="346" cy="250" r="5.5" fill="#c39bd3"/>
  <circle cx="318" cy="270" r="4.5" fill="#c39bd3"/>
  <circle cx="354" cy="262" r="4" fill="#d7bde2"/>

  <!-- ===== ROCKS / SUBSTRATE ===== -->
  <ellipse cx="140" cy="346" rx="36" ry="14" fill="#6c757d"/>
  <ellipse cx="135" cy="342" rx="24" ry="10" fill="#868e96"/>
  <ellipse cx="148" cy="344" rx="14" ry="8" fill="#adb5bd"/>

  <ellipse cx="370" cy="347" rx="30" ry="12" fill="#6c757d"/>
  <ellipse cx="365" cy="343" rx="20" ry="9" fill="#868e96"/>

  <!-- Sandy substrate bottom -->
  <ellipse cx="250" cy="354" rx="234" ry="14" fill="url(#sandGrad)"/>
  <rect x="22" y="348" width="456" height="10" fill="url(#sandGrad)"/>

  <!-- ===== FISH 1 – Orange clownfish swimming right ===== -->
  <g transform="translate(150,148)">
    <!-- Tail -->
    <polygon points="-35,0 -50,-16 -50,16" fill="#c05010"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="34" ry="20" fill="url(#fishOrange)"/>
    <!-- White stripe bars -->
    <rect x="-10" y="-20" width="7" height="40" rx="3.5" fill="white" opacity="0.82"/>
    <rect x="8" y="-20" width="6" height="40" rx="3" fill="white" opacity="0.82"/>
    <!-- Eye -->
    <circle cx="23" cy="-6" r="6" fill="white"/>
    <circle cx="24" cy="-6" r="3.5" fill="#111"/>
    <circle cx="25" cy="-7" r="1" fill="white"/>
    <!-- Top fin -->
    <path d="M-8,-20 Q8,-40 18,-20" fill="#e07030" opacity="0.85"/>
    <!-- Bottom fin -->
    <path d="M-8,20 Q8,40 18,20" fill="#e07030" opacity="0.75"/>
    <!-- Mouth -->
    <path d="M30,2 Q34,5 30,8" fill="none" stroke="#a03010" stroke-width="1.2"/>
  </g>

  <!-- ===== FISH 2 – Teal angelfish swimming left ===== -->
  <g transform="translate(320,228) scale(-1,1)">
    <!-- Tail -->
    <polygon points="-28,0 -42,-14 -42,14" fill="#0e8ea0"/>
    <!-- Body (slightly taller = angelfish shape) -->
    <ellipse cx="0" cy="0" rx="28" ry="17" fill="url(#fishTeal)"/>
    <!-- Stripe -->
    <rect x="-4" y="-17" width="6" height="34" rx="3" fill="white" opacity="0.55"/>
    <!-- Eye -->
    <circle cx="19" cy="-5" r="5" fill="white"/>
    <circle cx="20" cy="-5" r="3" fill="#0a2540"/>
    <circle cx="21" cy="-6" r="1" fill="white"/>
    <!-- Top fin (tall) -->
    <path d="M-5,-17 Q5,-38 14,-17" fill="#2dd4bf" opacity="0.8"/>
    <!-- Bottom fin -->
    <path d="M-5,17 Q5,38 14,17" fill="#2dd4bf" opacity="0.7"/>
  </g>

  <!-- ===== FISH 3 – Small pink fish top-center ===== -->
  <g transform="translate(255,85)">
    <polygon points="-22,0 -33,-11 -33,11" fill="#a04070"/>
    <ellipse cx="0" cy="0" rx="22" ry="13" fill="url(#fishPink)"/>
    <circle cx="15" cy="-4" r="4" fill="white"/>
    <circle cx="16" cy="-4" r="2.5" fill="#111"/>
    <circle cx="17" cy="-5" r="0.8" fill="white"/>
    <path d="M-4,-13 Q5,-24 11,-13" fill="#f9a8d4" opacity="0.85"/>
  </g>

  <!-- ===== FISH 4 – Tiny yellow fish far right ===== -->
  <g transform="translate(400,180)">
    <polygon points="-16,0 -24,-9 -24,9" fill="#ca8a04"/>
    <ellipse cx="0" cy="0" rx="16" ry="10" fill="#fde047"/>
    <circle cx="11" cy="-3" r="3.5" fill="white"/>
    <circle cx="12" cy="-3" r="2" fill="#111"/>
    <path d="M-3,-10 Q4,-18 9,-10" fill="#fbbf24" opacity="0.8"/>
  </g>

  <!-- ===== BUBBLES ===== -->
  <!-- From left plant -->
  <circle cx="78" cy="210" r="5.5" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.55"/>
  <circle cx="74" cy="175" r="4" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.45"/>
  <circle cx="80" cy="145" r="5" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- From coral center -->
  <circle cx="250" cy="272" r="5" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="246" cy="238" r="3.5" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="252" cy="205" r="4.5" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- From right area -->
  <circle cx="405" cy="248" r="4.5" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.45"/>
  <circle cx="400" cy="215" r="3" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.35"/>
  <circle cx="408" cy="185" r="4" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Glass reflection on left side -->
  <rect x="22" y="22" width="58" height="336" fill="url(#glassLeft)" rx="4"/>

  <!-- ===== TANK FRAME ===== -->
  <!-- Main border -->
  <rect x="10" y="10" width="480" height="360" rx="10" fill="none" stroke="#2c3e50" stroke-width="12"/>
  <!-- Top bar highlight -->
  <rect x="10" y="10" width="480" height="18" rx="10" fill="#3d5a6c"/>
  <!-- Bottom bar -->
  <rect x="10" y="352" width="480" height="18" rx="6" fill="#3d5a6c"/>
  <!-- Left and right side accents -->
  <rect x="10" y="10" width="14" height="360" fill="#3d5a6c" rx="4"/>
  <rect x="476" y="10" width="14" height="360" fill="#3d5a6c" rx="4"/>

  <!-- Corner bolts -->
  <circle cx="22" cy="22" r="5" fill="#4a6572"/>
  <circle cx="478" cy="22" r="5" fill="#4a6572"/>
  <circle cx="22" cy="358" r="5" fill="#4a6572"/>
  <circle cx="478" cy="358" r="5" fill="#4a6572"/>
</svg>
